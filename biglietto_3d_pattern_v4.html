<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#161740" />
  <title>Daniele — Digital Card</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    :root{
      --bg:#161740;
      --panel:rgba(15,15,24,.74);
      --paper:#f5f4ef;
      --accent:#4044b3;
      --accent-2:#7d81ff;
      --pattern-a:#4044b3;
      --pattern-b:#7d81ff;
      --pattern-c:#2a1d63;
      --pattern-opacity:.82;
      --pattern-blur:74px;
      --pattern-scale:1.08;

      --panel-width:390px;
      --panel-min-height:410px;
      --panel-mobile-max-height:72vh;
      --panel-radius:26px;
      --panel-padding:26px;

      --ui-wordmark-size:10px;
      --ui-small-size:9px;
      --panel-title-size:40px;
      --panel-description-size:14px;
      --button-text-size:13px;

      --safe-top:max(18px,env(safe-area-inset-top));
      --safe-bottom:max(18px,env(safe-area-inset-bottom));
    }

    *{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      color:white;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      touch-action:none;
    }

    /* Sfondo a pattern sfocato: non è un semplice linear-gradient. */
    .ambient-background{
      position:fixed;
      inset:-18%;
      z-index:-3;
      overflow:hidden;
      background:var(--bg);
      isolation:isolate;
    }

    .pattern-layer{
      position:absolute;
      inset:-20%;
      opacity:var(--pattern-opacity);
      filter:blur(var(--pattern-blur)) saturate(125%);
      transform:scale(var(--pattern-scale));
      will-change:transform;
      mix-blend-mode:screen;
    }

    .pattern-layer.a{
      background:
        repeating-radial-gradient(
          ellipse at 26% 38%,
          color-mix(in srgb,var(--pattern-a) 78%,transparent) 0 5%,
          transparent 6% 12%
        ),
        conic-gradient(
          from 18deg at 38% 54%,
          transparent 0 22%,
          color-mix(in srgb,var(--pattern-b) 58%,transparent) 28% 42%,
          transparent 48% 68%,
          color-mix(in srgb,var(--pattern-c) 72%,transparent) 76% 88%,
          transparent 94%
        );
      animation:patternDriftA 20s cubic-bezier(.45,0,.2,1) infinite alternate;
    }

    .pattern-layer.b{
      inset:-36%;
      opacity:calc(var(--pattern-opacity) * .72);
      background:
        repeating-conic-gradient(
          from 48deg at 66% 45%,
          color-mix(in srgb,var(--pattern-b) 65%,transparent) 0 10deg,
          transparent 12deg 27deg,
          color-mix(in srgb,var(--pattern-a) 38%,transparent) 30deg 39deg,
          transparent 42deg 65deg
        );
      animation:patternDriftB 27s cubic-bezier(.45,0,.2,1) infinite alternate;
    }

    .pattern-layer.c{
      inset:-28%;
      opacity:calc(var(--pattern-opacity) * .52);
      background:
        repeating-radial-gradient(
          circle at 70% 70%,
          color-mix(in srgb,var(--pattern-c) 74%,transparent) 0 3%,
          transparent 4% 10%
        );
      animation:patternDriftC 24s ease-in-out infinite alternate;
    }

    .ambient-background::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%,transparent 28%,rgba(0,0,0,.35) 75%,rgba(0,0,0,.62) 100%),
        linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.2));
      z-index:5;
    }

    @keyframes patternDriftA{
      0%{transform:translate3d(-5%,-4%,0) rotate(-7deg) scale(var(--pattern-scale))}
      100%{transform:translate3d(8%,7%,0) rotate(13deg) scale(calc(var(--pattern-scale) * 1.15))}
    }

    @keyframes patternDriftB{
      0%{transform:translate3d(7%,-6%,0) rotate(10deg) scale(1.12)}
      100%{transform:translate3d(-7%,8%,0) rotate(-17deg) scale(1.28)}
    }

    @keyframes patternDriftC{
      0%{transform:translate3d(-3%,8%,0) rotate(-4deg) scale(1.05)}
      100%{transform:translate3d(8%,-7%,0) rotate(9deg) scale(1.22)}
    }

    #scene{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .grain,.vignette{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:2;
    }

    .grain{
      opacity:.024;
      mix-blend-mode:soft-light;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .vignette{
      background:radial-gradient(circle at center,transparent 46%,rgba(0,0,0,.48) 118%);
    }

    .chrome{
      position:fixed;
      inset:0;
      z-index:5;
      pointer-events:none;
    }

    .wordmark{
      position:absolute;
      top:var(--safe-top);
      left:22px;
      display:flex;
      align-items:center;
      gap:10px;
      color:rgba(255,255,255,.76);
      font-size:var(--ui-wordmark-size);
      font-weight:650;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .wordmark::before{
      content:"";
      width:22px;
      height:1px;
      background:var(--accent);
      box-shadow:0 0 15px color-mix(in srgb,var(--accent) 70%,transparent);
    }

    .mode{
      position:absolute;
      top:var(--safe-top);
      right:22px;
      color:rgba(255,255,255,.42);
      font-size:var(--ui-small-size);
      letter-spacing:.13em;
      text-transform:uppercase;
    }

    .hint{
      position:absolute;
      left:50%;
      bottom:var(--safe-bottom);
      transform:translateX(-50%);
      color:rgba(255,255,255,.42);
      font-size:var(--ui-small-size);
      letter-spacing:.14em;
      text-transform:uppercase;
      white-space:nowrap;
      transition:.35s ease;
    }

    body.panel-open .hint{
      opacity:0;
      transform:translate(-50%,8px);
    }

    .panel{
      position:fixed;
      z-index:10;
      top:50%;
      right:28px;
      width:min(var(--panel-width),calc(100vw - 56px));
      min-height:var(--panel-min-height);
      transform:translate(120%,-50%);
      opacity:0;
      pointer-events:none;
      overflow:hidden;
      border-radius:var(--panel-radius);
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 15% 0%,color-mix(in srgb,var(--accent) 15%,transparent),transparent 34%),
        linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.018)),
        var(--panel);
      backdrop-filter:blur(32px) saturate(125%);
      -webkit-backdrop-filter:blur(32px) saturate(125%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.09),
        0 36px 110px rgba(0,0,0,.58);
    }

    .panel.open{pointer-events:auto}

    .panel-inner{
      min-height:var(--panel-min-height);
      padding:var(--panel-padding);
      display:flex;
      flex-direction:column;
      position:relative;
    }

    .close{
      position:absolute;
      top:15px;
      right:15px;
      width:36px;
      height:36px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:50%;
      background:rgba(255,255,255,.035);
      color:white;
      font-size:17px;
      cursor:pointer;
    }

    .index{
      margin-bottom:42px;
      color:rgba(255,255,255,.46);
      font-size:10px;
      letter-spacing:.12em;
    }

    .eyebrow{
      margin-bottom:10px;
      color:color-mix(in srgb,var(--accent) 72%,white);
      font-size:9px;
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    .site-title{
      margin:0;
      font-size:var(--panel-title-size);
      line-height:.96;
      letter-spacing:-.05em;
      font-weight:650;
    }

    .site-description{
      margin:20px 0 25px;
      max-width:31ch;
      color:rgba(255,255,255,.6);
      font-size:var(--panel-description-size);
      line-height:1.62;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-bottom:24px;
    }

    .meta span{
      padding:7px 10px;
      border:1px solid rgba(255,255,255,.09);
      border-radius:999px;
      color:rgba(255,255,255,.43);
      font-size:8px;
      letter-spacing:.11em;
      text-transform:uppercase;
    }

    .actions{
      margin-top:auto;
      display:grid;
      gap:10px;
    }

    .primary,.secondary{
      height:50px;
      border-radius:15px;
      padding:0 17px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:0;
      font:inherit;
      font-size:var(--button-text-size);
      font-weight:650;
      cursor:pointer;
      text-decoration:none;
    }

    .primary{
      color:#111;
      background:var(--paper);
    }

    .secondary{
      justify-content:center;
      color:rgba(255,255,255,.66);
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
    }

    .loader{
      position:fixed;
      inset:0;
      z-index:100;
      display:grid;
      place-items:center;
      background:var(--bg);
    }

    .loader-inner{
      width:min(250px,68vw);
      text-align:center;
    }

    .loader-title{
      margin-bottom:16px;
      color:rgba(255,255,255,.56);
      font-size:9px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .loader-track{
      height:1px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .loader-progress{
      width:0;
      height:100%;
      background:var(--accent);
      box-shadow:0 0 14px color-mix(in srgb,var(--accent) 70%,transparent);
    }

    .error{
      display:none;
      position:fixed;
      inset:0;
      z-index:200;
      place-items:center;
      padding:30px;
      background:var(--bg);
      text-align:center;
    }

    .error div{max-width:500px}
    .error h1{font-size:26px;font-weight:600}
    .error p{color:rgba(255,255,255,.48);line-height:1.6}

    @media(max-width:900px){
      .panel{
        top:auto;
        left:10px;
        right:10px;
        bottom:max(10px,env(safe-area-inset-bottom));
        width:auto;
        min-height:0;
        max-height:var(--panel-mobile-max-height);
        transform:translateY(115%);
        border-radius:calc(var(--panel-radius) * .92);
      }

      .panel-inner{
        min-height:0;
        padding:calc(var(--panel-padding) * .86);
      }

      .index{margin-bottom:28px}
      .site-title{font-size:calc(var(--panel-title-size) * .85)}
      .site-description{max-width:none;margin:16px 0 20px;font-size:calc(var(--panel-description-size) * .93)}
      .meta{margin-bottom:20px}
      .primary,.secondary{height:48px}
    }

    @media(max-width:520px){
      .wordmark{left:15px}
      .mode{right:15px}
      .panel{left:7px;right:7px;bottom:max(7px,env(safe-area-inset-bottom))}
      .site-title{font-size:calc(var(--panel-title-size) * .775)}
      .close{top:13px;right:13px}
    }

    @media(prefers-reduced-motion:reduce){
      .pattern-layer{animation:none}
    }
  </style>
</head>

<body>
  <div class="ambient-background" aria-hidden="true">
    <div class="pattern-layer a"></div>
    <div class="pattern-layer b"></div>
    <div class="pattern-layer c"></div>
  </div>

  <canvas id="scene"></canvas>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="chrome">
    <div class="wordmark" id="uiWordmark">Daniele Mastrorilli</div>
    <div class="mode" id="modeText">Interactive object</div>
    <div class="hint" id="hintText">Trascina per ruotare · seleziona un link</div>
  </div>

  <aside class="panel" id="panel" aria-hidden="true">
    <div class="panel-inner">
      <button class="close" id="closeButton" aria-label="Chiudi">×</button>
      <div class="index" id="panelIndex">01 / 04</div>
      <div class="eyebrow" id="panelEyebrow">Digital destination</div>
      <h2 class="site-title" id="siteTitle">Instagram</h2>
      <p class="site-description" id="siteDescription"></p>
      <div class="meta" id="meta"></div>
      <div class="actions">
        <a class="primary" id="siteLink" href="#" target="_blank" rel="noopener">
          <span id="openText">Apri il sito</span><span>↗</span>
        </a>
        <button class="secondary" id="backButton">Torna al biglietto</button>
      </div>
    </div>
  </aside>

  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-title" id="loaderTitle">Loading digital identity</div>
      <div class="loader-track"><div class="loader-progress" id="loaderProgress"></div></div>
    </div>
  </div>

  <div class="error" id="error">
    <div>
      <h1>Il 3D non è disponibile</h1>
      <p>Apri il file con Chrome, Edge, Firefox o Safari aggiornato.</p>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    /* ==========================================================
       PERSONALIZZAZIONE GENERALE
       Qui puoi modificare colori, dimensioni, testi, link e 3D.
       ========================================================== */
    const CONFIG = {
      appearance: {
        generalColor: "#4044b3",
        secondaryColor: "#7d81ff",
        backgroundColor: "#161740",
        patternColorA: "#4044b3",
        patternColorB: "#7d81ff",
        patternColorC: "#2a1d63",
        patternOpacity: 1,
        patternBlur: 74,
        patternScale: 1.08,

        cardColor: "#141414",
        cardTextColor: "#ffffff",
        cardMutedColor: "rgba(243,241,234,.46)",
        panelColor: "rgba(15,15,24,.74)"
      },

      /* Dimensioni fisiche del biglietto 3D. */
      cardSize: {
        width: 7,
        height: 4,
        depth: 0.13,
        cornerRadius: 0.30,

        desktopScale: 1.10,
        tabletScale: 0.90,
        mobileScale: 0.75
      },

      /* Dimensioni della finestra che si apre cliccando un link. */
      panelSize: {
        desktopWidth: 390,
        minHeight: 410,
        mobileMaxHeight: 70,
        borderRadius: 26,
        padding: 26
      },

      textSizes: {
        cardName: 92,
        cardRole: 60,
        cardMeta: 50,
        cardLink: 70,
        cardArrow: 60,

        uiWordmark: 10,
        uiSmall: 9,

        panelTitle: 40,
        panelDescription: 14,
        panelButton: 13
      },

      environment: {
        ringRadius: 5.5,
        ringThickness: 0.15,
        ringOpacity: 0.9,

        particlesDesktop: 260,
        particlesLowPower: 120,

        floatingObjectsDesktop: 16,
        floatingObjectsLowPower: 8,

        orbitalRings: 6,
        accentSpheres: 20,
        glassMonoliths: 8
      },

      ui: {
        wordmark: "Daniele Mastrorilli",
        panelEyebrow: "Digital destination",
        openButton: "Apri il sito",
        backButton: "Torna al biglietto",
        loadingText: "Loading digital identity",
        desktopMode: "Desktop object",
        tabletMode: "Tablet object",
        mobileMode: "Touch object"
      },

      card: {
        name: "DANIELE",
        surname: "MASTRORILLI",
        role: "CREATIVE DEVELOPER",
        location: "PUGLIA · ITALY",
        footer: "DIGITAL IDENTITY / 2026"
      },

      links: [
        {
          name: "Instagram",
          url: "https://www.instagram.com/",
          description: "Frammenti della mia vita.",
          tags: ["Social","Visual","Direct"]
        },
        {
          name: "GitHub",
          url: "https://github.com/",
          description: "Codice, esperimenti e prototipi che trasformano le idee in qualcosa di reale.",
          tags: ["Code","Open source","Build"]
        },
        {
          name: "Projects",
          url: "#",
          description: "Una selezione di interfacce, concept digitali e progetti interattivi.",
          tags: ["3D","Interface","Creative"]
        },
        {
          name: "Contact",
          url: "mailto:danielemastrorilli@aol.com",
          description: "Per collaborazioni, proposte o semplicemente una buona idea da costruire insieme.",
          tags: ["Email","Work","Available"]
        }
      ]
    };

    const rootStyle = document.documentElement.style;

    rootStyle.setProperty("--bg", CONFIG.appearance.backgroundColor);
    rootStyle.setProperty("--panel", CONFIG.appearance.panelColor);
    rootStyle.setProperty("--accent", CONFIG.appearance.generalColor);
    rootStyle.setProperty("--accent-2", CONFIG.appearance.secondaryColor);
    rootStyle.setProperty("--pattern-a", CONFIG.appearance.patternColorA);
    rootStyle.setProperty("--pattern-b", CONFIG.appearance.patternColorB);
    rootStyle.setProperty("--pattern-c", CONFIG.appearance.patternColorC);
    rootStyle.setProperty("--pattern-opacity", CONFIG.appearance.patternOpacity);
    rootStyle.setProperty("--pattern-blur", `${CONFIG.appearance.patternBlur}px`);
    rootStyle.setProperty("--pattern-scale", CONFIG.appearance.patternScale);

    rootStyle.setProperty("--panel-width", `${CONFIG.panelSize.desktopWidth}px`);
    rootStyle.setProperty("--panel-min-height", `${CONFIG.panelSize.minHeight}px`);
    rootStyle.setProperty("--panel-mobile-max-height", `${CONFIG.panelSize.mobileMaxHeight}vh`);
    rootStyle.setProperty("--panel-radius", `${CONFIG.panelSize.borderRadius}px`);
    rootStyle.setProperty("--panel-padding", `${CONFIG.panelSize.padding}px`);

    rootStyle.setProperty("--ui-wordmark-size", `${CONFIG.textSizes.uiWordmark}px`);
    rootStyle.setProperty("--ui-small-size", `${CONFIG.textSizes.uiSmall}px`);
    rootStyle.setProperty("--panel-title-size", `${CONFIG.textSizes.panelTitle}px`);
    rootStyle.setProperty("--panel-description-size", `${CONFIG.textSizes.panelDescription}px`);
    rootStyle.setProperty("--button-text-size", `${CONFIG.textSizes.panelButton}px`);

    document.body.style.backgroundColor = CONFIG.appearance.backgroundColor;

    const $ = s => document.querySelector(s);
    const canvas = $("#scene");
    const loader = $("#loader");
    const loaderProgress = $("#loaderProgress");
    const panel = $("#panel");
    const closeButton = $("#closeButton");
    const backButton = $("#backButton");
    const panelIndex = $("#panelIndex");
    const panelEyebrow = $("#panelEyebrow");
    const siteTitle = $("#siteTitle");
    const siteDescription = $("#siteDescription");
    const siteLink = $("#siteLink");
    const openText = $("#openText");
    const meta = $("#meta");
    const modeText = $("#modeText");
    const hintText = $("#hintText");
    const loaderTitle = $("#loaderTitle");
    const uiWordmark = $("#uiWordmark");
    const error = $("#error");

    uiWordmark.textContent = CONFIG.ui.wordmark;
    panelEyebrow.textContent = CONFIG.ui.panelEyebrow;
    openText.textContent = CONFIG.ui.openButton;
    backButton.textContent = CONFIG.ui.backButton;
    loaderTitle.textContent = CONFIG.ui.loadingText;

    const isTouch = matchMedia("(pointer:coarse)").matches;
    const lowPower = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
    const reducedMotion = matchMedia("(prefers-reduced-motion:reduce)").matches;

    hintText.textContent = isTouch
      ? "Trascina per ruotare · tocca un link"
      : "Trascina per ruotare · seleziona un link";

    if(!window.THREE || !window.gsap || !document.createElement("canvas").getContext("webgl")){
      loader.style.display = "none";
      error.style.display = "grid";
      return;
    }

    const accent = new THREE.Color(CONFIG.appearance.generalColor);
    const accent2 = new THREE.Color(CONFIG.appearance.secondaryColor);
    const cardColor = new THREE.Color(CONFIG.appearance.cardColor);
    const cardText = CONFIG.appearance.cardTextColor;
    const cardMuted = CONFIG.appearance.cardMutedColor;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: !lowPower,
      alpha: true,
      powerPreference: "high-performance"
    });

    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, lowPower ? 1.15 : (isTouch ? 1.4 : 1.7)));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    renderer.shadowMap.enabled = !lowPower;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(new THREE.Color(CONFIG.appearance.backgroundColor), .032);

    const camera = new THREE.PerspectiveCamera(37, innerWidth / innerHeight, .1, 110);
    camera.position.set(0, .15, 14.35);

    scene.add(new THREE.HemisphereLight(0xf2f0ea, 0x090912, .82));

    const key = new THREE.SpotLight(0xf4f1ea, 96, 36, Math.PI * .22, .78, 1.4);
    key.position.set(-4.6, 7, 6);
    key.target.position.set(0,0,0);
    key.castShadow = !lowPower;
    scene.add(key, key.target);

    const accentLight = new THREE.PointLight(accent, 18, 22, 2);
    accentLight.position.set(5, 1, -2);
    scene.add(accentLight);

    const accentLight2 = new THREE.PointLight(accent2, 10, 19, 2);
    accentLight2.position.set(-5, -1.8, -1);
    scene.add(accentLight2);

    const lower = new THREE.PointLight(0xa7adba, 8, 18, 2);
    lower.position.set(-3, -4, 3);
    scene.add(lower);

    function makeTexture(draw, w=1024, h=512){
      const c = document.createElement("canvas");
      c.width = w;
      c.height = h;
      const ctx = c.getContext("2d");
      draw(ctx,w,h);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
      return tex;
    }

    function makeLabelTexture(text, {bold=false,color=cardText}={}){
      return makeTexture((ctx,w,h)=>{
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = color;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.font = `${bold ? 700 : 500} ${CONFIG.textSizes.cardLink}px Arial,sans-serif`;
        ctx.fillText(text,10,h/2);
      },900,128);
    }

    function makeArrowTexture(color=cardText){
      return makeTexture((ctx,w,h)=>{
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `500 ${CONFIG.textSizes.cardArrow}px Arial,sans-serif`;
        ctx.fillText("↗",w/2,h/2);
      },128,128);
    }

    function roundedCardGeometry(width,height,depth,radius){
      const shape = new THREE.Shape();
      const x = -width/2;
      const y = -height/2;

      shape.moveTo(x+radius,y);
      shape.lineTo(x+width-radius,y);
      shape.quadraticCurveTo(x+width,y,x+width,y+radius);
      shape.lineTo(x+width,y+height-radius);
      shape.quadraticCurveTo(x+width,y+height,x+width-radius,y+height);
      shape.lineTo(x+radius,y+height);
      shape.quadraticCurveTo(x,y+height,x,y+height-radius);
      shape.lineTo(x,y+radius);
      shape.quadraticCurveTo(x,y,x+radius,y);

      const geometry = new THREE.ExtrudeGeometry(shape,{
        depth,
        bevelEnabled:true,
        bevelSegments:7,
        steps:1,
        bevelSize:.045,
        bevelThickness:.045,
        curveSegments:28
      });

      geometry.center();
      return geometry;
    }

    function dashedUnderline(width,color){
      const points = [];
      const segments = 10;
      const dash = width / (segments * 1.7);

      for(let i=0;i<segments;i++){
        const start = -width/2 + i * (dash * 1.7);
        points.push(
          new THREE.Vector3(start,0,0),
          new THREE.Vector3(Math.min(start+dash,width/2),0,0)
        );
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);

      return new THREE.LineSegments(
        geometry,
        new THREE.LineBasicMaterial({
          color,
          transparent:true,
          opacity:0,
          toneMapped:false
        })
      );
    }

    const cardRig = new THREE.Group();
    const cardFloat = new THREE.Group();
    const cardVisual = new THREE.Group();
    cardRig.add(cardFloat);
    cardFloat.add(cardVisual);
    scene.add(cardRig);

    const CW = CONFIG.cardSize.width;
    const CH = CONFIG.cardSize.height;
    const CD = CONFIG.cardSize.depth;

    const card = new THREE.Mesh(
      roundedCardGeometry(CW,CH,CD,CONFIG.cardSize.cornerRadius),
      new THREE.MeshPhysicalMaterial({
        color:cardColor,
        metalness:.03,
        roughness:.13,
        transmission:.66,
        thickness:.76,
        ior:1.38,
        transparent:true,
        clearcoat:1,
        clearcoatRoughness:.075,
        envMapIntensity:1.1,
        side:THREE.DoubleSide
      })
    );

    card.castShadow = true;
    card.receiveShadow = true;
    cardVisual.add(card);

    const faceTexture = makeTexture((ctx,w,h)=>{
      ctx.clearRect(0,0,w,h);

      const gradient = ctx.createLinearGradient(0,0,w,h);
      gradient.addColorStop(0,"rgba(255,255,255,.035)");
      gradient.addColorStop(1,"rgba(255,255,255,.006)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0,0,w,h);

      ctx.fillStyle = cardText;
      ctx.font = `700 ${CONFIG.textSizes.cardName}px Arial,sans-serif`;
      ctx.fillText(CONFIG.card.name,86,240);
      ctx.fillText(CONFIG.card.surname,86,335);

      ctx.fillStyle = cardMuted;
      ctx.font = `500 ${CONFIG.textSizes.cardRole}px Arial,sans-serif`;
      ctx.fillText(CONFIG.card.role,92,395);

      ctx.textAlign = "left";
      ctx.fillStyle = cardMuted;
      ctx.font = `500 ${CONFIG.textSizes.cardMeta}px monospace`;
      ctx.fillText(CONFIG.card.location,92,110);

      ctx.fillStyle = CONFIG.appearance.generalColor;
      ctx.fillRect(92,145,48,4);

      ctx.fillStyle = cardMuted;
      ctx.font = `500 ${CONFIG.textSizes.cardMeta}px monospace`;
      ctx.fillText(CONFIG.card.footer,92,h-74);
    },2048,1190);

    const face = new THREE.Mesh(
      new THREE.PlaneGeometry(CW-.16,CH-.16),
      new THREE.MeshBasicMaterial({
        map:faceTexture,
        transparent:true,
        depthWrite:false,
        toneMapped:false
      })
    );

    face.position.z = CD/2 + .05;
    cardVisual.add(face);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const hitTargets = [];
    const linkGroups = [];
    let hovered = null;
    let selected = null;
    let panelOpen = false;

    const normalArrow = makeArrowTexture(cardMuted);
    const accentArrow = makeArrowTexture(CONFIG.appearance.generalColor);

    function createLink(item,index){
      const group = new THREE.Group();

      const x = CW * .163;
      const startY = CH * .288;
      const rowGap = CH * .17;

      group.position.set(x,startY-index*rowGap,CD/2+.065);
      group.userData.item = {...item,index};

      const hit = new THREE.Mesh(
        new THREE.PlaneGeometry(CW*.34,CH*.128),
        new THREE.MeshBasicMaterial({
          transparent:true,
          opacity:0,
          depthWrite:false
        })
      );

      hit.position.x = CW * .081;
      hit.userData.root = group;
      hit.userData.item = group.userData.item;
      group.add(hit);
      hitTargets.push(hit);

      const normalTex = makeLabelTexture(item.name,{bold:false});
      const boldTex = makeLabelTexture(item.name,{bold:true});

      const labelMaterial = new THREE.MeshBasicMaterial({
        map:normalTex,
        transparent:true,
        depthWrite:false,
        toneMapped:false
      });

      const label = new THREE.Mesh(
        new THREE.PlaneGeometry(CW*.264,CH*.07),
        labelMaterial
      );

      label.position.x = CW * .025;
      group.add(label);

      const arrowMaterial = new THREE.MeshBasicMaterial({
        map:normalArrow,
        transparent:true,
        depthWrite:false,
        toneMapped:false
      });

      const arrow = new THREE.Mesh(
        new THREE.PlaneGeometry(CH*.059,CH*.059),
        arrowMaterial
      );

      arrow.position.x = CW * .186;
      group.add(arrow);

      const underline = dashedUnderline(CW*.267,accent);
      underline.position.set(CW*.025,-CH*.048,.01);
      group.add(underline);

      group.userData.label = label;
      group.userData.normalTex = normalTex;
      group.userData.boldTex = boldTex;
      group.userData.arrow = arrow;
      group.userData.arrowBaseX = CW*.186;
      group.userData.underline = underline;

      cardVisual.add(group);
      linkGroups.push(group);
    }

    CONFIG.links.forEach(createLink);

    const world = new THREE.Group();
    scene.add(world);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(55,55),
      new THREE.MeshPhysicalMaterial({
        color:0x090911,
        roughness:.28,
        metalness:.22,
        transparent:true,
        opacity:.72
      })
    );

    floor.rotation.x = -Math.PI/2;
    floor.position.y = -3.5;
    floor.receiveShadow = true;
    world.add(floor);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(4.25,4.8,.22,96),
      new THREE.MeshPhysicalMaterial({
        color:0x0c0c14,
        roughness:.23,
        metalness:.36,
        clearcoat:.45,
        clearcoatRoughness:.16,
        transparent:true,
        opacity:.88
      })
    );

    platform.position.y = -3.34;
    platform.receiveShadow = true;
    world.add(platform);

    const halo = new THREE.Mesh(
      new THREE.TorusGeometry(
        CONFIG.environment.ringRadius,
        CONFIG.environment.ringThickness,
        18,
        240
      ),
      new THREE.MeshBasicMaterial({
        color:accent,
        transparent:true,
        opacity:CONFIG.environment.ringOpacity,
        toneMapped:false
      })
    );

    halo.position.set(0,.05,-3.8);
    halo.rotation.x = .15;
    world.add(halo);

    /* Orbite secondarie per dare profondità senza sporcare il design. */
    const orbitalGroup = new THREE.Group();

    for(let i=0;i<CONFIG.environment.orbitalRings;i++){
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(
          CONFIG.environment.ringRadius + 1.1 + i*.62,
          .015 + i*.003,
          8,
          220
        ),
        new THREE.MeshBasicMaterial({
          color:i%2===0 ? accent : accent2,
          transparent:true,
          opacity:.08 - i*.009,
          toneMapped:false
        })
      );

      ring.rotation.set(
        .18+i*.14,
        i*.21,
        -.28+i*.17
      );

      ring.position.set(
        (i%2===0?-1:1)*i*.18,
        -.2+i*.1,
        -4.8-i*.45
      );

      ring.userData.speed = (i%2===0?1:-1) * (.005+i*.0015);
      orbitalGroup.add(ring);
    }

    world.add(orbitalGroup);

    /* Piccole sfere luminose che orbitano intorno alla card. */
    const accentSpheres = new THREE.Group();

    for(let i=0;i<CONFIG.environment.accentSpheres;i++){
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(.055+i*.009,24,24),
        new THREE.MeshBasicMaterial({
          color:i%2===0 ? accent : accent2,
          transparent:true,
          opacity:.78,
          toneMapped:false
        })
      );

      sphere.userData.angle = (Math.PI*2/CONFIG.environment.accentSpheres)*i;
      sphere.userData.radius = 5.1+i*.32;
      sphere.userData.speed = .16+i*.025;
      sphere.userData.height = -.3+i*.28;
      accentSpheres.add(sphere);
    }

    world.add(accentSpheres);

    /* Monoliti di vetro in profondità. */
    const monoliths = new THREE.Group();
    const monolithMaterial = new THREE.MeshPhysicalMaterial({
      color:accent2,
      roughness:.11,
      metalness:.02,
      transmission:.72,
      thickness:.72,
      transparent:true,
      opacity:.38,
      clearcoat:1,
      clearcoatRoughness:.06
    });

    for(let i=0;i<CONFIG.environment.glassMonoliths;i++){
      const monolith = new THREE.Mesh(
        new THREE.BoxGeometry(.18+.05*Math.random(),1.1+Math.random()*1.8,.18+.05*Math.random()),
        monolithMaterial
      );

      const side = i%2===0 ? -1 : 1;
      monolith.position.set(
        side*(5.3+Math.random()*3.4),
        -1.6+Math.random()*4.8,
        -5.2-Math.random()*5.2
      );

      monolith.rotation.set(
        Math.random()*.35,
        Math.random()*.9,
        (Math.random()-.5)*.22
      );

      monolith.userData.offset = Math.random()*10;
      monolith.userData.speed = .14+Math.random()*.12;
      monoliths.add(monolith);
    }

    world.add(monoliths);

    /* Frammenti geometrici sospesi. */
    const floatingObjects = new THREE.Group();

    const floaterMaterial = new THREE.MeshPhysicalMaterial({
      color:accent,
      roughness:.12,
      metalness:.04,
      transmission:.7,
      thickness:.5,
      transparent:true,
      opacity:.5,
      clearcoat:1,
      clearcoatRoughness:.08
    });

    const floaterCount = lowPower
      ? CONFIG.environment.floatingObjectsLowPower
      : CONFIG.environment.floatingObjectsDesktop;

    for(let i=0;i<floaterCount;i++){
      const geometry = i%3===0
        ? new THREE.OctahedronGeometry(.12+Math.random()*.12,0)
        : i%3===1
        ? new THREE.TetrahedronGeometry(.12+Math.random()*.12,0)
        : new THREE.IcosahedronGeometry(.11+Math.random()*.12,0);

      const object = new THREE.Mesh(geometry,floaterMaterial);
      const a = Math.random()*Math.PI*2;
      const r = 6+Math.random()*7;

      object.position.set(
        Math.cos(a)*r,
        -2+Math.random()*7,
        -5-Math.random()*9
      );

      object.rotation.set(
        Math.random()*3,
        Math.random()*3,
        Math.random()*3
      );

      object.userData.speed = .06+Math.random()*.2;
      object.userData.offset = Math.random()*10;
      floatingObjects.add(object);
    }

    world.add(floatingObjects);

    /* Un nastro 3D sottile dietro alla card. */
    const ribbonCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-7,-1.3,-5.8),
      new THREE.Vector3(-4,2.4,-6.2),
      new THREE.Vector3(0,-.8,-6.8),
      new THREE.Vector3(4,2,-6.1),
      new THREE.Vector3(7,-1,-5.9)
    ]);

    const ribbon = new THREE.Mesh(
      new THREE.TubeGeometry(ribbonCurve,180,.026,8,false),
      new THREE.MeshBasicMaterial({
        color:accent2,
        transparent:true,
        opacity:.17,
        toneMapped:false
      })
    );

    world.add(ribbon);

    const particleTexture = makeTexture((ctx,w,h)=>{
      const g = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
      g.addColorStop(0,"rgba(255,255,255,.9)");
      g.addColorStop(1,"rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
    },64,64);

    const count = lowPower
      ? CONFIG.environment.particlesLowPower
      : CONFIG.environment.particlesDesktop;

    const positions = new Float32Array(count*3);

    for(let i=0;i<count;i++){
      const j = i*3;
      positions[j] = (Math.random()-.5)*27;
      positions[j+1] = (Math.random()-.4)*14;
      positions[j+2] = -Math.random()*28+5;
    }

    const pointsGeometry = new THREE.BufferGeometry();
    pointsGeometry.setAttribute("position",new THREE.BufferAttribute(positions,3));

    const dust = new THREE.Points(
      pointsGeometry,
      new THREE.PointsMaterial({
        map:particleTexture,
        color:0xf0eee8,
        size:.032,
        transparent:true,
        opacity:.3,
        blending:THREE.AdditiveBlending,
        depthWrite:false
      })
    );

    world.add(dust);

    let layoutMode = "desktop";
    const layout = {scale:1,x:0,y:.14,z:14.35};

    function updateLayout(immediate=false){
      const w = innerWidth;
      const h = innerHeight;
      const portrait = h>w;

      if(w<700){
        layoutMode = "mobile";
        layout.scale = portrait
          ? Math.min(CONFIG.cardSize.mobileScale,w/620)
          : CONFIG.cardSize.mobileScale*1.14;
        layout.x = 0;
        layout.y = portrait ? .66 : .18;
        layout.z = portrait ? 15.1 : 14.8;
      }else if(w<1100){
        layoutMode = "tablet";
        layout.scale = CONFIG.cardSize.tabletScale;
        layout.x = 0;
        layout.y = .2;
        layout.z = 14.5;
      }else{
        layoutMode = "desktop";
        layout.scale = CONFIG.cardSize.desktopScale;
        layout.x = 0;
        layout.y = .12;
        layout.z = 14.2;
      }

      const d = immediate ? 0 : .7;

      gsap.to(cardRig.scale,{
        x:layout.scale,
        y:layout.scale,
        z:layout.scale,
        duration:d,
        ease:"power3.out"
      });

      gsap.to(cardRig.position,{
        x:selected&&layoutMode!=="mobile" ? -2.15 : layout.x,
        y:selected&&layoutMode==="mobile" ? 1.2 : layout.y,
        duration:d,
        ease:"power3.out"
      });

      gsap.to(camera.position,{
        z:layout.z,
        duration:d,
        ease:"power3.out"
      });

      modeText.textContent = layoutMode==="desktop"
        ? CONFIG.ui.desktopMode
        : layoutMode==="tablet"
        ? CONFIG.ui.tabletMode
        : CONFIG.ui.mobileMode;
    }

    const drag = {
      active:false,
      moved:false,
      startX:0,
      startY:0,
      lastX:0,
      lastY:0
    };

    const desired = {x:-.04,y:-.13};
    const smooth = {x:desired.x,y:desired.y};
    const parallax = {x:0,y:0};

    function eventToPointer(e){
      pointer.x = e.clientX/innerWidth*2-1;
      pointer.y = -(e.clientY/innerHeight*2-1);
    }

    function pick(e){
      eventToPointer(e);
      raycaster.setFromCamera(pointer,camera);
      return raycaster.intersectObjects(hitTargets,false)[0] || null;
    }

    function resetLink(root){
      root.userData.label.material.map = root.userData.normalTex;
      root.userData.label.material.needsUpdate = true;
      root.userData.arrow.material.map = normalArrow;
      root.userData.arrow.material.needsUpdate = true;

      gsap.to(root.userData.underline.material,{
        opacity:0,
        duration:.18
      });

      gsap.to(root.userData.arrow.position,{
        x:root.userData.arrowBaseX,
        y:0,
        duration:.18,
        ease:"power2.out"
      });
    }

    function activateLink(root){
      root.userData.label.material.map = root.userData.boldTex;
      root.userData.label.material.needsUpdate = true;
      root.userData.arrow.material.map = accentArrow;
      root.userData.arrow.material.needsUpdate = true;

      gsap.to(root.userData.underline.material,{
        opacity:.95,
        duration:.18
      });

      gsap.to(root.userData.arrow.position,{
        x:root.userData.arrowBaseX + CW*.011,
        y:CH*.013,
        duration:.18,
        ease:"power2.out"
      });
    }

    function setHover(target){
      if(hovered===target) return;

      if(hovered){
        resetLink(hovered.userData.root);
      }

      hovered = target;
      document.body.style.cursor = hovered ? "pointer" : drag.active ? "grabbing" : "grab";

      if(hovered){
        activateLink(hovered.userData.root);
      }
    }

    function openPanel(item,target){
      selected = item;
      panelOpen = true;
      document.body.classList.add("panel-open");
      panel.classList.add("open");
      panel.setAttribute("aria-hidden","false");

      panelIndex.textContent = String(item.index+1).padStart(2,"0")
        +" / "
        +String(CONFIG.links.length).padStart(2,"0");

      siteTitle.textContent = item.name;
      siteDescription.textContent = item.description;
      siteLink.href = item.url;
      siteLink.style.opacity = item.url==="#" ? ".5" : "1";
      meta.innerHTML = item.tags.map(tag=>`<span>${tag}</span>`).join("");

      if(target){
        activateLink(target.userData.root);
      }

      if(layoutMode==="mobile"){
        gsap.to(panel,{
          y:"0%",
          opacity:1,
          duration:.62,
          ease:"power4.out"
        });

        gsap.to(cardRig.position,{
          y:1.25,
          duration:.75,
          ease:"power3.inOut"
        });

        gsap.to(cardRig.scale,{
          x:layout.scale*.78,
          y:layout.scale*.78,
          z:layout.scale*.78,
          duration:.75,
          ease:"power3.inOut"
        });
      }else{
        gsap.to(panel,{
          x:"0%",
          y:"-50%",
          opacity:1,
          duration:.66,
          ease:"power4.out"
        });

        gsap.to(cardRig.position,{
          x:layoutMode==="desktop" ? -2.25 : -1.6,
          duration:.8,
          ease:"power3.inOut"
        });

        gsap.to(cardRig.rotation,{
          y:-.16,
          duration:.75,
          ease:"power3.inOut"
        });
      }

      if(navigator.vibrate) navigator.vibrate(8);
    }

    function closePanel(){
      if(!panelOpen) return;

      panelOpen = false;
      selected = null;
      document.body.classList.remove("panel-open");
      panel.setAttribute("aria-hidden","true");

      linkGroups.forEach(resetLink);

      if(layoutMode==="mobile"){
        gsap.to(panel,{
          y:"115%",
          opacity:0,
          duration:.44,
          ease:"power3.in",
          onComplete:()=>panel.classList.remove("open")
        });
      }else{
        gsap.to(panel,{
          x:"120%",
          y:"-50%",
          opacity:0,
          duration:.46,
          ease:"power3.in",
          onComplete:()=>panel.classList.remove("open")
        });
      }

      gsap.to(cardRig.position,{
        x:layout.x,
        y:layout.y,
        duration:.7,
        ease:"power3.out"
      });

      gsap.to(cardRig.scale,{
        x:layout.scale,
        y:layout.scale,
        z:layout.scale,
        duration:.7,
        ease:"power3.out"
      });

      gsap.to(cardRig.rotation,{
        y:0,
        duration:.65,
        ease:"power3.out"
      });
    }

    closeButton.addEventListener("click",closePanel);
    backButton.addEventListener("click",closePanel);
    addEventListener("keydown",e=>{if(e.key==="Escape")closePanel()});

    canvas.addEventListener("pointerdown",e=>{
      drag.active = true;
      drag.moved = false;
      drag.startX = drag.lastX = e.clientX;
      drag.startY = drag.lastY = e.clientY;
      canvas.setPointerCapture?.(e.pointerId);
      document.body.style.cursor = "grabbing";
    });

    canvas.addEventListener("pointermove",e=>{
      parallax.x = (e.clientX/innerWidth-.5)*2;
      parallax.y = (e.clientY/innerHeight-.5)*2;

      if(drag.active){
        const dx = e.clientX-drag.lastX;
        const dy = e.clientY-drag.lastY;

        if(Math.hypot(e.clientX-drag.startX,e.clientY-drag.startY)>7){
          drag.moved = true;
        }

        desired.y += dx*.0054;
        desired.x += dy*.0038;
        desired.x = THREE.MathUtils.clamp(desired.x,-.44,.44);

        drag.lastX = e.clientX;
        drag.lastY = e.clientY;
      }else if(!isTouch){
        const hit = pick(e);
        setHover(hit ? hit.object : null);
      }
    });

    canvas.addEventListener("pointerup",e=>{
      if(!drag.active) return;

      drag.active = false;
      canvas.releasePointerCapture?.(e.pointerId);
      document.body.style.cursor = hovered ? "pointer" : "grab";

      if(!drag.moved){
        const hit = pick(e);

        if(hit && hit.object.userData.item){
          openPanel(hit.object.userData.item,hit.object);
        }else if(panelOpen){
          closePanel();
        }
      }
    });

    canvas.addEventListener("pointercancel",()=>{
      drag.active = false;
      document.body.style.cursor = "grab";
    });

    updateLayout(true);
    document.body.style.cursor = "grab";

    const intro = gsap.timeline({defaults:{ease:"power3.out"}});

    intro
      .to(loaderProgress,{
        width:"100%",
        duration:.82,
        ease:"power2.inOut"
      })
      .fromTo(cardRig.scale,
        {x:.08,y:.08,z:.08},
        {
          x:layout.scale*1.03,
          y:layout.scale*1.03,
          z:layout.scale*1.03,
          duration:1.02,
          ease:"power4.out"
        },
        .46
      )
      .fromTo(cardRig.rotation,
        {x:.66,y:-1.05,z:-.15},
        {
          x:0,
          y:0,
          z:0,
          duration:1.2,
          ease:"power4.out"
        },
        .46
      )
      .to(loader,{
        opacity:0,
        duration:.42,
        onComplete:()=>loader.remove()
      },.72)
      .to(cardRig.scale,{
        x:layout.scale,
        y:layout.scale,
        z:layout.scale,
        duration:.58
      },.94)
      .from(".wordmark,.mode,.hint",{
        opacity:0,
        y:-8,
        stagger:.08,
        duration:.44
      },.98);

    const clock = new THREE.Clock();
    const look = new THREE.Vector3();

    function animate(){
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      smooth.x += (desired.x-smooth.x)*.07;
      smooth.y += (desired.y-smooth.y)*.07;

      cardFloat.rotation.x = smooth.x + (reducedMotion ? 0 : Math.sin(t*.5)*.01);
      cardFloat.rotation.y = smooth.y + (reducedMotion ? 0 : Math.cos(t*.42)*.018);
      cardFloat.position.y = reducedMotion ? 0 : Math.sin(t*.68)*.06;

      halo.rotation.z = t*.01;
      dust.rotation.y = t*.002;
      dust.position.y = Math.sin(t*.15)*.035;

      orbitalGroup.children.forEach(ring=>{
        ring.rotation.z += ring.userData.speed;
      });

      accentSpheres.children.forEach((sphere,i)=>{
        const angle = sphere.userData.angle + t*sphere.userData.speed;
        sphere.position.set(
          Math.cos(angle)*sphere.userData.radius,
          sphere.userData.height+Math.sin(t*.55+i)*.28,
          -3.3+Math.sin(angle)*1.15
        );
      });

      monoliths.children.forEach((m,i)=>{
        m.rotation.y += .0014+i*.00012;
        m.position.y += Math.sin(t*m.userData.speed+m.userData.offset)*.0008;
      });

      floatingObjects.children.forEach((o,i)=>{
        o.rotation.x += .0012+o.userData.speed*.004;
        o.rotation.y += .001+o.userData.speed*.003;
        o.position.y += Math.sin(t*o.userData.speed+o.userData.offset)*.00075;
      });

      ribbon.rotation.z = Math.sin(t*.12)*.035;
      ribbon.position.y = Math.sin(t*.25)*.08;

      key.position.x = -4.6 + Math.sin(t*.18)*.55;
      accentLight.position.y = 1 + Math.cos(t*.22)*.45;
      accentLight2.position.x = -5 + Math.sin(t*.17)*.7;

      const tx = panelOpen ? parallax.x*.04 : parallax.x*.12;
      const ty = panelOpen ? parallax.y*.03 : parallax.y*.07;

      camera.position.x += (tx-camera.position.x)*.024;
      camera.position.y += ((.15-ty)-camera.position.y)*.024;

      look.set(0,panelOpen&&layoutMode==="mobile" ? .3 : 0,0);
      camera.lookAt(look);

      renderer.render(scene,camera);
    }

    animate();

    addEventListener("resize",()=>{
      renderer.setSize(innerWidth,innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio,lowPower?1.15:(isTouch?1.4:1.7)));
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      updateLayout();
    });
  })();
  </script>
</body>
</html>
